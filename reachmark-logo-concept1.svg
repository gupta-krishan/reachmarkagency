<svg xmlns="http://www.w3.org/2000/svg" width="480" height="120" viewBox="0 0 480 120" role="img">
  <title>Reach Mark Agency — Territory Mark Logo</title>
  <desc>Reach Mark Agency logo featuring an open arc with arrow representing reach and a yellow center dot representing the mark</desc>

  <!-- ── ICON MARK ── -->

  <!-- Outer arc — open circle suggesting infinite reach -->
  <path d="M 18 60 A 42 42 0 1 1 68 95" fill="none" stroke="#FF5500" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Arrow tip at end of arc = direction of reach -->
  <polyline points="60,107 72,96 60,85" fill="none" stroke="#FF5500" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Center dot = the mark / target -->
  <circle cx="60" cy="60" r="7" fill="#FFD200"/>

  <!-- Subtle crosshair lines -->
  <line x1="60" y1="38" x2="60" y2="48" stroke="#F2F0EB" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="38" y1="60" x2="48" y2="60" stroke="#F2F0EB" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="72" y1="60" x2="82" y2="60" stroke="#F2F0EB" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>

  <!-- ── WORDMARK ── -->
  <text x="108" y="55"
    font-family="'Cormorant Garamond', Georgia, 'Times New Roman', serif"
    font-size="36"
    font-weight="300"
    letter-spacing="0.13em"
    fill="#F2F0EB">REACH MARK</text>

  <!-- Tagline row -->
  <text x="110" y="76"
    font-family="'Courier New', Courier, monospace"
    font-size="10"
    letter-spacing="0.28em"
    fill="#777777">AGENCY  ·  EST. 2024</text>

  <!-- Accent lines under wordmark -->
  <rect x="110" y="83" width="32" height="1.5" fill="#FF5500"/>
  <rect x="148" y="83" width="10" height="1.5" fill="#FFD200"/>

  <!-- Tagline -->
  <text x="110" y="101"
    font-family="'Courier New', Courier, monospace"
    font-size="10"
    letter-spacing="0.18em"
    fill="#555555">MARK YOUR TERRITORY ONLINE</text>

</svg>
